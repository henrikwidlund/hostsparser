name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5
        with:
          pr-mode: true
          args: |
            --baseline qodana.sarif.json
            --linter "jetbrains/qodana-cdnet:2026.1"
            --within-docker false
          use-caches: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1052839006 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json